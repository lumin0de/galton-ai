# AWS Amplify — frontend em /web (monorepo com npm workspaces na raiz).
# A URL da API está em web/src/lib/apiBaseUrl.ts (Supabase Edge galton-api).

version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: web/dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
