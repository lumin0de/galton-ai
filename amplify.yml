# AWS Amplify — duas formas válidas (use UMA):
#
# A) Ficheiro na raiz (recomendado): deixe em Build settings → "Build specification"
#    a opção que usa este amplify.yml do repositório (sem YAML colado a sobrescrever).
#
# B) Se a consola tiver YAML próprio, substitua-o por este conteúdo completo.
#
# Variáveis no Console: NODE_VERSION=20 ou 22
#   VITE_SUPABASE_URL=https://<PROJECT>.supabase.co  → API em .../functions/v1/galton-api
#   (ou VITE_API_URL com URL completa da função)

version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Com workspaces na raiz (package.json), npm ci instala também o pacote "web"
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    # Saída do Vite está sempre em web/dist
    baseDirectory: web/dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
